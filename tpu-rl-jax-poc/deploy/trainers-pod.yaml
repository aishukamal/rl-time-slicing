apiVersion: v1
kind: Pod
metadata:
  name: tpu-trainers
  labels:
    app: tpu-trainers
    timeslice.io/job-id: trainer
spec:
  nodeSelector:
    cloud.google.com/gke-nodepool: tpu-v5e-gvisor-pool
    cloud.google.com/gke-tpu-accelerator: tpu-v5-lite-podslice
    cloud.google.com/gke-tpu-topology: 2x4
  tolerations:
    - key: sandbox.gke.io/runtime
      operator: Exists
      effect: NoSchedule
  hostPID: true
  initContainers:
    - name: copy-libtpu
      image: us-west1-docker.pkg.dev/aishuk-test/tpu-poc-repo/tpu-time-slicing-poc:latest
      command: ["cp", "/app/_libtpu.so", "/libtpu-shared/_libtpu.so"]
      volumeMounts:
        - name: libtpu
          mountPath: /libtpu-shared
  containers:
    - name: trainer-a
      image: us-west1-docker.pkg.dev/aishuk-test/tpu-poc-repo/grpo-trainer:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 8200
      env:
        - name: TRAINER_PORT
          value: "8200"
        - name: MODEL_PATH
          value: "gpt2"
        - name: MAX_SEQ_LEN
          value: "1024"
        - name: JAX_PLATFORMS
          value: tpu
        - name: TPU_LIBRARY_PATH
          value: "/libtpu-shared/_libtpu.so"
      resources:
        limits:
          google.com/tpu: 8
        requests:
          google.com/tpu: 8
          memory: "16Gi"
          cpu: "4"
      volumeMounts:
        - name: libtpu
          mountPath: /libtpu-shared
        - name: host-run
          mountPath: /run
        - name: shm
          mountPath: /dev/shm
    - name: trainer-b
      image: us-west1-docker.pkg.dev/aishuk-test/tpu-poc-repo/grpo-trainer:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 8201
      env:
        - name: TRAINER_PORT
          value: "8201"
        - name: MODEL_PATH
          value: "gpt2"
        - name: MAX_SEQ_LEN
          value: "1024"
        - name: JAX_PLATFORMS
          value: tpu
        - name: TPU_LIBRARY_PATH
          value: "/libtpu-shared/_libtpu.so"
        - name: TPU_WORKER_HOSTNAMES
          value: "localhost"
        - name: TPU_WORKER_ID
          value: "0"
        - name: TPU_ACCELERATOR_TYPE
          value: "v5litepod-8"
        - name: TPU_TOPOLOGY
          value: "2x4"
        - name: TPU_CHIPS_PER_HOST_BOUNDS
          value: "2,4,1"
        - name: TPU_HOST_BOUNDS
          value: "1,1,1"
        - name: TPU_SKIP_MDS_QUERY
          value: "true"
        - name: TPU_TOPOLOGY_WRAP
          value: "false,false,false"
      resources:
        requests:
          memory: "16Gi"
          cpu: "4"
      securityContext:
        privileged: true
      volumeMounts:
        - name: libtpu
          mountPath: /libtpu-shared
        - name: host-run
          mountPath: /run
        - name: shm
          mountPath: /dev/shm
        - name: host-dev-vfio
          mountPath: /dev/vfio
  volumes:
    - name: libtpu
      emptyDir: {}
    - name: host-run
      hostPath:
        path: /run
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: host-dev-vfio
      hostPath:
        path: /dev/vfio
  restartPolicy: Never
