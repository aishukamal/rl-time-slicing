apiVersion: v1
kind: Pod
metadata:
  name: tpu-samplers
  labels:
    app: tpu-samplers
    timeslice.io/job-id: sampler
spec:
  nodeSelector:
    cloud.google.com/gke-nodepool: tpu-v5e-spot-pool
    cloud.google.com/gke-tpu-accelerator: tpu-v5-lite-podslice
    cloud.google.com/gke-tpu-topology: 2x4
  hostPID: true
  initContainers:
    - name: copy-libtpu
      image: us-west1-docker.pkg.dev/aishuk-test/tpu-poc-repo/tpu-time-slicing-poc:latest
      command: ["cp", "/app/_libtpu.so", "/libtpu-shared/_libtpu.so"]
      volumeMounts:
        - name: libtpu
          mountPath: /libtpu-shared
  containers:
    - name: sampler-a
      image: us-west1-docker.pkg.dev/aishuk-test/tpu-poc-repo/tpu-rl-sampler:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 8300
      env:
        - name: SAMPLER_PORT
          value: "8300"
        - name: MODEL_PATH
          value: "gpt2"
        - name: MODEL_NAME
          value: "gpt2"
        - name: VLLM_MAX_MODEL_LEN
          value: "1024"
        - name: MAX_NEW_TOKENS
          value: "512"
        - name: TPU_LIBRARY_PATH
          value: "/libtpu-shared/_libtpu.so"
        - name: DEFER_VLLM
          value: "false"
        - name: TRAINER_URL
          value: "http://trainer-a-svc:8200"
        - name: VLLM_ALLOW_INSECURE_SERIALIZATION
          value: "1"
      resources:
        limits:
          google.com/tpu: 8
        requests:
          google.com/tpu: 8
      volumeMounts:
        - name: libtpu
          mountPath: /libtpu-shared
        - name: host-run
          mountPath: /run
        - name: shm
          mountPath: /dev/shm
      readinessProbe:
        httpGet:
          path: /health
          port: 8300
        initialDelaySeconds: 30
        periodSeconds: 15
        failureThreshold: 120
      livenessProbe:
        httpGet:
          path: /health
          port: 8300
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 60
    - name: sampler-b
      image: us-west1-docker.pkg.dev/aishuk-test/tpu-poc-repo/tpu-rl-sampler:latest
      imagePullPolicy: Always
      ports:
        - containerPort: 8301
      env:
        - name: SAMPLER_PORT
          value: "8301"
        - name: MODEL_PATH
          value: "gpt2"
        - name: MODEL_NAME
          value: "gpt2"
        - name: VLLM_MAX_MODEL_LEN
          value: "1024"
        - name: MAX_NEW_TOKENS
          value: "512"
        - name: TPU_LIBRARY_PATH
          value: "/libtpu-shared/_libtpu.so"
        - name: DEFER_VLLM
          value: "true"
        - name: TRAINER_URL
          value: "http://trainer-b-svc:8201"
        - name: VLLM_ALLOW_INSECURE_SERIALIZATION
          value: "1"
        - name: TPU_WORKER_HOSTNAMES
          value: "localhost"
        - name: TPU_WORKER_ID
          value: "0"
        - name: TPU_ACCELERATOR_TYPE
          value: "v5litepod-8"
        - name: TPU_TOPOLOGY
          value: "2x4"
        - name: TPU_CHIPS_PER_HOST_BOUNDS
          value: "2,4,1"
        - name: TPU_HOST_BOUNDS
          value: "1,1,1"
        - name: TPU_SKIP_MDS_QUERY
          value: "true"
        - name: TPU_TOPOLOGY_WRAP
          value: "false,false,false"
      securityContext:
        privileged: true
      volumeMounts:
        - name: libtpu
          mountPath: /libtpu-shared
        - name: host-run
          mountPath: /run
        - name: shm
          mountPath: /dev/shm
        - name: host-dev-vfio
          mountPath: /dev/vfio
      readinessProbe:
        httpGet:
          path: /health
          port: 8301
        initialDelaySeconds: 5
        periodSeconds: 10
  volumes:
    - name: libtpu
      emptyDir: {}
    - name: host-run
      hostPath:
        path: /run
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: host-dev-vfio
      hostPath:
        path: /dev/vfio
  restartPolicy: Never
